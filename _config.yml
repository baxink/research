lang: zh-CN
timezone: Asia/Shanghai

title: 船舶技术笔记
tagline: 船舶检验与规范研究
description: >-
  记录船舶技术、检验规范与海事法规相关的学习笔记和研究文章。

url: "https://baxink.github.io"
baseurl: "/research"

github:
  username: baxink

theme: jekyll-theme-chirpy

permalink: /posts/:title/

# 不输出到 destination，让 Jekyll 用默认 _site
# 避免与 upload-pages-artifact 冲突

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs/
  - tools/
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .git
  - .github
